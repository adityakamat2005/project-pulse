<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card fade-in">

    <div class="auth-logo">
      <div class="logo-box">P</div>
      <div class="logo-text">ProjectPulse</div>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to manage your projects and tasks.</p>

    <!-- Alerts -->
    <div th:if="${errorMsg}" class="alert alert-error">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span th:text="${errorMsg}"></span>
    </div>
    <div th:if="${logoutMsg}" class="alert alert-success">
      <i class="bi bi-check-circle-fill"></i>
      <span th:text="${logoutMsg}"></span>
    </div>
    <div th:if="${successMsg}" class="alert alert-success">
      <i class="bi bi-check-circle-fill"></i>
      <span th:text="${successMsg}"></span>
    </div>

    <!-- Login Form -->
    <form th:action="@{/auth/login}" method="post">
      <div style="margin-bottom:16px;">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control"
               placeholder="Enter your username" required autofocus/>
      </div>
      <div style="margin-bottom:20px;">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control"
               placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>

    <div class="divider">Demo Credentials</div>
    <div style="background:#f8fafc;border-radius:8px;padding:12px 16px;font-size:12px;color:var(--text-muted);line-height:2;">
      <code>admin</code> / <code>Admin@123</code> &nbsp;—&nbsp; Administrator<br/>
      <code>leader1</code> / <code>Leader@123</code> &nbsp;—&nbsp; Project Leader<br/>
      <code>member1</code> / <code>Member@123</code> &nbsp;—&nbsp; Team Member
    </div>

    <div class="auth-footer">
      Don't have an account?
      <a th:href="@{/auth/register}" style="font-weight:700;">Register here</a>
    </div>
  </div>
</div>
</body>
</html>
