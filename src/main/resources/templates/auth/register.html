<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card fade-in" style="max-width:480px;">

    <div class="auth-logo">
      <div class="logo-box">P</div>
      <div class="logo-text">ProjectPulse</div>
    </div>

    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Join your team on ProjectPulse.</p>

    <div th:if="${errorMsg}" class="alert alert-error">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span th:text="${errorMsg}"></span>
    </div>

    <form th:action="@{/auth/register}" th:object="${userDto}" method="post">

      <div style="margin-bottom:14px;">
        <label class="form-label">Full Name</label>
        <input type="text" th:field="*{fullName}" class="form-control"
               th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
               placeholder="Your full name" required/>
        <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}"
             th:errors="*{fullName}"></div>
      </div>

      <div style="margin-bottom:14px;">
        <label class="form-label">Username</label>
        <input type="text" th:field="*{username}" class="form-control"
               th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
               placeholder="Unique username" required/>
        <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
             th:errors="*{username}"></div>
      </div>

      <div style="margin-bottom:14px;">
        <label class="form-label">Email</label>
        <input type="email" th:field="*{email}" class="form-control"
               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
               placeholder="your@email.com" required/>
        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>
      </div>

      <div style="margin-bottom:14px;">
        <label class="form-label">Password</label>
        <input type="password" th:field="*{password}" class="form-control"
               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
               placeholder="Min 6 characters" required/>
        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
             th:errors="*{password}"></div>
      </div>

      <div style="margin-bottom:20px;">
        <label class="form-label">Confirm Password</label>
        <input type="password" th:field="*{confirmPassword}" class="form-control"
               th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
               placeholder="Repeat password" required/>
        <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
             th:errors="*{confirmPassword}"></div>
      </div>

      <!-- Hidden role = ROLE_MEMBER for self-registration -->
      <input type="hidden" name="role" value="ROLE_MEMBER"/>

      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">
        <i class="bi bi-person-plus"></i> Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account?
      <a th:href="@{/auth/login}" style="font-weight:700;">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
