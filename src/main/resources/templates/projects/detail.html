<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${project.title} + ' — ProjectPulse'">Project</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('Project Detail')}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/topbar :: alerts}"></div>

      <!-- Header -->
      <div class="page-header">
        <div>
          <div class="d-flex align-center gap-8 mb-4">
            <a th:href="@{/projects}" class="text-muted fs-13"><i class="bi bi-arrow-left"></i> Projects</a>
          </div>
          <h1 class="page-title" th:text="${project.title}"></h1>
          <div class="d-flex align-center gap-8 mt-4">
            <span class="badge"
                  th:classappend="'badge-' + ${project.status.name().toLowerCase().replace('_','-')}"
                  th:text="${project.status}"></span>
            <span class="text-muted fs-12">
              Created by <strong th:text="${project.createdBy.fullName}"></strong>
              on <span th:text="${#temporals.format(project.createdAt,'dd MMM yyyy')}"></span>
            </span>
          </div>
        </div>
        <div class="page-actions">
          <a th:href="@{/chat/{id}(id=${project.id})}" class="btn btn-outline">
            <i class="bi bi-chat-dots"></i> Team Chat
          </a>
          <a th:href="@{/tasks(projectId=${project.id})}" class="btn btn-outline">
            <i class="bi bi-list-task"></i> All Tasks
          </a>
          <a sec:authorize="hasAnyRole('ADMIN','LEADER')"
             th:href="@{/tasks/new(projectId=${project.id})}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Add Task
          </a>
          <a sec:authorize="hasAnyRole('ADMIN','LEADER')"
             th:href="@{/projects/{id}/edit(id=${project.id})}" class="btn btn-outline">
            <i class="bi bi-pencil"></i> Edit
          </a>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:2fr 1fr;gap:24px;">

        <!-- Left: Description + Tasks -->
        <div>
          <!-- Description -->
          <div class="card mb-24">
            <div class="card-header"><span class="card-title">Description</span></div>
            <div class="card-body">
              <p th:text="${project.description ?: 'No description provided.'}"
                 style="color:var(--text-muted);line-height:1.7;"></p>
            </div>
          </div>

          <!-- Progress -->
          <div class="card mb-24">
            <div class="card-header">
              <span class="card-title">Progress</span>
              <span class="fw-700" th:text="${project.progressPercentage} + '%'"></span>
            </div>
            <div class="card-body">
              <div class="progress-bar-wrap" style="height:12px;">
                <div class="progress-bar-fill"
                     th:style="'width:' + ${project.progressPercentage} + '%'"
                     th:classappend="${project.progressPercentage == 100} ? 'green' : ''"></div>
              </div>
              <div class="d-flex justify-between fs-12 text-muted mt-8">
                <span th:text="${project.completedTaskCount} + ' completed'"></span>
                <span th:text="${project.tasks.size()} + ' total tasks'"></span>
              </div>
            </div>
          </div>

          <!-- Task Preview -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">Tasks</span>
              <a th:href="@{/tasks(projectId=${project.id})}" class="btn btn-outline btn-sm">View All</a>
            </div>
            <div class="card-body">
              <div th:if="${project.tasks.isEmpty()}" class="empty-state" style="padding:30px;">
                <i class="bi bi-list-task"></i>
                <h3>No tasks yet</h3>
              </div>
              <div th:each="task : ${project.tasks}" class="task-item"
                   th:classappend="${task.pinned} ? 'pinned' : ''">
                <div style="flex:1;">
                  <div class="d-flex align-center gap-8">
                    <i class="bi bi-pin-fill task-pin-icon" th:if="${task.pinned}"></i>
                    <div class="task-title">
                      <a th:href="@{/tasks/{id}(id=${task.id})}" th:text="${task.title}"></a>
                    </div>
                  </div>
                  <div class="task-meta">
                    <span><i class="bi bi-person"></i> <span th:text="${task.assignedTo?.fullName ?: 'Unassigned'}"></span></span>
                    <span><i class="bi bi-calendar"></i> <span th:text="${#temporals.format(task.deadline,'dd MMM')}"></span></span>
                  </div>
                </div>
                <div class="d-flex align-center gap-8">
                  <span class="badge" th:classappend="'badge-' + ${task.priority.name().toLowerCase()}" th:text="${task.priority}"></span>
                  <span class="badge" th:classappend="'badge-' + ${task.status.name().toLowerCase().replace('_','-')}" th:text="${task.status}"></span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: Info Panel -->
        <div>
          <!-- Project Info -->
          <div class="card mb-24">
            <div class="card-header"><span class="card-title">Project Info</span></div>
            <div class="card-body">
              <div style="display:grid;gap:14px;">
                <div>
                  <div class="form-label" style="color:var(--text-muted);margin-bottom:2px;">Deadline</div>
                  <div class="fw-600" th:text="${#temporals.format(project.deadline,'dd MMMM yyyy')}"></div>
                </div>
                <div>
                  <div class="form-label" style="color:var(--text-muted);margin-bottom:2px;">Project Leader</div>
                  <div class="fw-600" th:text="${project.leader?.fullName ?: 'Not assigned'}"></div>
                </div>
                <div>
                  <div class="form-label" style="color:var(--text-muted);margin-bottom:2px;">Status</div>
                  <!-- Status update form (leader/admin) -->
                  <form sec:authorize="hasAnyRole('ADMIN','LEADER')"
                        th:action="@{/projects/{id}/status(id=${project.id})}" method="post"
                        class="d-flex gap-8 align-center">
                    <select name="status" class="form-select" style="font-size:12px;padding:4px 8px;">
                      <option th:each="s : ${T(com.projectpulse.entity.Project.ProjectStatus).values()}"
                              th:value="${s.name()}" th:text="${s}"
                              th:selected="${s == project.status}"></option>
                    </select>
                    <button type="submit" class="btn btn-primary btn-sm">Save</button>
                  </form>
                  <span sec:authorize="!hasAnyRole('ADMIN','LEADER')" class="badge"
                        th:classappend="'badge-' + ${project.status.name().toLowerCase().replace('_','-')}"
                        th:text="${project.status}"></span>
                </div>
              </div>
            </div>
          </div>

          <!-- Members -->
          <div class="card mb-24">
            <div class="card-header"><span class="card-title">Team Members</span></div>
            <div class="card-body">
              <div th:if="${project.members.isEmpty()}" class="text-muted fs-13">No members assigned.</div>
              <div th:each="member : ${project.members}" class="d-flex align-center gap-10"
                   style="padding:8px 0;border-bottom:1px solid var(--border);">
                <div class="chat-avatar" style="width:32px;height:32px;font-size:12px;"
                     th:text="${#strings.substring(member.fullName,0,1)}"></div>
                <div>
                  <div class="fw-600 fs-13" th:text="${member.fullName}"></div>
                  <div class="text-muted fs-12" th:text="${member.username}"></div>
                </div>
              </div>
            </div>
          </div>

          <!-- Danger Zone (Admin only) -->
          <div class="card" sec:authorize="hasRole('ADMIN')"
               style="border-color:var(--danger);">
            <div class="card-header" style="background:#fef2f2;">
              <span class="card-title" style="color:var(--danger);">Danger Zone</span>
            </div>
            <div class="card-body">
              <form th:action="@{/projects/{id}/delete(id=${project.id})}" method="post">
                <button type="submit" class="btn btn-danger btn-sm"
                        data-confirm="Delete this project and ALL its tasks? This cannot be undone!">
                  <i class="bi bi-trash"></i> Delete Project
                </button>
              </form>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
