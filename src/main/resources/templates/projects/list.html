<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Projects — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('Projects')}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/topbar :: alerts}"></div>

      <div class="page-header">
        <div>
          <h1 class="page-title">Projects</h1>
          <p class="page-subtitle" th:text="${projects.size()} + ' project(s) found'"></p>
        </div>
        <div class="page-actions">
          <a sec:authorize="hasAnyRole('ADMIN','LEADER')" th:href="@{/projects/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> New Project
          </a>
        </div>
      </div>

      <div th:if="${projects.isEmpty()}" class="empty-state">
        <i class="bi bi-folder2-open"></i>
        <h3>No projects yet</h3>
        <p>Create your first project to start assigning tasks and tracking progress.</p>
        <a sec:authorize="hasAnyRole('ADMIN','LEADER')" th:href="@{/projects/new}" class="btn btn-primary">
          <i class="bi bi-plus-lg"></i> Create Project
        </a>
      </div>

      <div th:unless="${projects.isEmpty()}"
           style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;">
        <div th:each="project : ${projects}" class="project-card">
          <div class="d-flex justify-between align-center mb-16">
            <span class="badge"
                  th:classappend="'badge-' + ${project.status.name().toLowerCase().replace('_','-')}"
                  th:text="${project.status}"></span>
            <span class="text-muted fs-12"
                  th:text="'Due ' + ${#temporals.format(project.deadline,'dd MMM yyyy')}"></span>
          </div>

          <h3 class="project-card-title">
            <a th:href="@{/projects/{id}(id=${project.id})}" th:text="${project.title}"></a>
          </h3>
          <p class="project-card-desc"
             th:text="${project.description ?: 'No description provided.'}"></p>

          <!-- Progress -->
          <div style="margin-bottom:14px;">
            <div class="d-flex justify-between fs-12 text-muted mb-4">
              <span>Progress</span>
              <span th:text="${project.progressPercentage} + '%'"></span>
            </div>
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill"
                   th:style="'width:' + ${project.progressPercentage} + '%'"
                   th:classappend="${project.progressPercentage == 100} ? 'green' : ''"></div>
            </div>
          </div>

          <!-- Meta -->
          <div class="task-meta mb-16">
            <span><i class="bi bi-person-fill"></i> <span th:text="${project.leader?.fullName ?: 'No leader'}"></span></span>
            <span><i class="bi bi-people-fill"></i> <span th:text="${project.members.size()} + ' members'"></span></span>
            <span><i class="bi bi-list-task"></i> <span th:text="${project.tasks.size()} + ' tasks'"></span></span>
          </div>

          <!-- Actions -->
          <div class="d-flex gap-8">
            <a th:href="@{/projects/{id}(id=${project.id})}" class="btn btn-outline btn-sm" style="flex:1;justify-content:center;">
              <i class="bi bi-eye"></i> View
            </a>
            <a th:href="@{/tasks(projectId=${project.id})}" class="btn btn-primary btn-sm" style="flex:1;justify-content:center;">
              <i class="bi bi-list-task"></i> Tasks
            </a>
            <a th:href="@{/chat/{id}(id=${project.id})}" class="btn btn-outline btn-sm btn-icon">
              <i class="bi bi-chat-dots"></i>
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
