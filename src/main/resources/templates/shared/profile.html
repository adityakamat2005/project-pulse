<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>My Profile — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('My Profile')}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/topbar :: alerts}"></div>

      <div class="page-header">
        <h1 class="page-title">My Profile</h1>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:860px;">

        <!-- Profile Info -->
        <div class="card">
          <div class="card-header"><span class="card-title">Personal Information</span></div>
          <div class="card-body">

            <!-- Avatar -->
            <div style="text-align:center;margin-bottom:24px;">
              <div style="width:80px;height:80px;background:var(--primary);border-radius:50%;
                          display:flex;align-items:center;justify-content:center;
                          font-size:32px;font-weight:800;color:#fff;margin:0 auto 12px;"
                   th:text="${#strings.substring(user.fullName,0,1)}"></div>
              <div class="fw-700 fs-15" th:text="${user.fullName}"></div>
              <div class="text-muted fs-12" th:text="'@' + ${user.username}"></div>
              <div class="mt-4">
                <span class="badge"
                      th:classappend="${user.primaryRole == 'ROLE_ADMIN'} ? 'badge-admin' : (${user.primaryRole == 'ROLE_LEADER'} ? 'badge-leader' : 'badge-member')"
                      th:text="${user.primaryRole.replace('ROLE_','')}"></span>
              </div>
            </div>

            <form th:action="@{/profile/update}" method="post">
              <div style="margin-bottom:14px;">
                <label class="form-label">Full Name</label>
                <input type="text" name="fullName" class="form-control"
                       th:value="${user.fullName}" required/>
              </div>
              <div style="margin-bottom:14px;">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control"
                       th:value="${user.phone}" placeholder="Your phone number"/>
              </div>
              <div style="margin-bottom:20px;">
                <label class="form-label">Bio</label>
                <textarea name="bio" class="form-control" rows="3"
                          data-maxlength="500"
                          placeholder="Tell your team about yourself..."
                          th:text="${user.bio}"></textarea>
              </div>
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> Save Profile
              </button>
            </form>
          </div>
        </div>

        <div>
          <!-- Account Info (read-only) -->
          <div class="card mb-24">
            <div class="card-header"><span class="card-title">Account Details</span></div>
            <div class="card-body" style="display:grid;gap:12px;">
              <div>
                <div class="text-muted fs-12 mb-4">Email</div>
                <div class="fw-600" th:text="${user.email}"></div>
              </div>
              <div>
                <div class="text-muted fs-12 mb-4">Member Since</div>
                <div class="fw-600" th:text="${#temporals.format(user.createdAt,'dd MMMM yyyy')}"></div>
              </div>
              <div>
                <div class="text-muted fs-12 mb-4">Account Status</div>
                <span class="badge badge-active">Active</span>
              </div>
            </div>
          </div>

          <!-- Change Password -->
          <div class="card">
            <div class="card-header"><span class="card-title">Change Password</span></div>
            <div class="card-body">
              <form th:action="@{/profile/change-password}" method="post">
                <div style="margin-bottom:14px;">
                  <label class="form-label">Current Password</label>
                  <input type="password" name="currentPassword" class="form-control"
                         placeholder="Your current password" required/>
                </div>
                <div style="margin-bottom:14px;">
                  <label class="form-label">New Password</label>
                  <input type="password" name="newPassword" class="form-control"
                         placeholder="Min 6 characters" required/>
                </div>
                <div style="margin-bottom:20px;">
                  <label class="form-label">Confirm New Password</label>
                  <input type="password" name="confirmPassword" class="form-control"
                         placeholder="Repeat new password" required/>
                </div>
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-key"></i> Change Password
                </button>
              </form>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
