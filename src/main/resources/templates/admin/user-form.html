<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Create User — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('Create User')}"></div>
    <div class="page-body">

      <div class="page-header">
        <div>
          <a th:href="@{/admin/users}" class="text-muted fs-13">
            <i class="bi bi-arrow-left"></i> Back to Users
          </a>
          <h1 class="page-title mt-8">Create New User</h1>
        </div>
      </div>

      <div style="max-width:540px;">
        <div class="card">
          <div class="card-body">
            <form th:action="@{/admin/users/new}" th:object="${userDto}" method="post">

              <div style="margin-bottom:16px;">
                <label class="form-label">Full Name <span style="color:var(--danger);">*</span></label>
                <input type="text" th:field="*{fullName}" class="form-control"
                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"
                       placeholder="Full name"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
              </div>

              <div style="margin-bottom:16px;">
                <label class="form-label">Username <span style="color:var(--danger);">*</span></label>
                <input type="text" th:field="*{username}" class="form-control"
                       th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                       placeholder="Unique username"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
              </div>

              <div style="margin-bottom:16px;">
                <label class="form-label">Email <span style="color:var(--danger);">*</span></label>
                <input type="email" th:field="*{email}" class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                       placeholder="user@example.com"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
              </div>

              <div style="margin-bottom:16px;">
                <label class="form-label">Role <span style="color:var(--danger);">*</span></label>
                <select th:field="*{role}" class="form-select">
                  <option value="ROLE_ADMIN">Admin</option>
                  <option value="ROLE_LEADER">Project Leader</option>
                  <option value="ROLE_MEMBER" selected>Team Member</option>
                </select>
              </div>

              <div style="margin-bottom:16px;">
                <label class="form-label">Password <span style="color:var(--danger);">*</span></label>
                <input type="password" th:field="*{password}" class="form-control"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                       placeholder="Min 6 characters"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
              </div>

              <div style="margin-bottom:24px;">
                <label class="form-label">Confirm Password <span style="color:var(--danger);">*</span></label>
                <input type="password" th:field="*{confirmPassword}" class="form-control"
                       th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                       placeholder="Repeat password"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
              </div>

              <div class="d-flex gap-8">
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-person-plus"></i> Create User
                </button>
                <a th:href="@{/admin/users}" class="btn btn-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
