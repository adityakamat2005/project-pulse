<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${user.fullName} + ' — ProjectPulse'">User Detail</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('User Detail')}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/topbar :: alerts}"></div>

      <div class="page-header">
        <div>
          <a th:href="@{/admin/users}" class="text-muted fs-13">
            <i class="bi bi-arrow-left"></i> Back to Users
          </a>
          <h1 class="page-title mt-8" th:text="${user.fullName}"></h1>
          <div class="d-flex align-center gap-8 mt-4">
            <span class="badge"
                  th:classappend="${user.primaryRole == 'ROLE_ADMIN'} ? 'badge-admin' : (${user.primaryRole == 'ROLE_LEADER'} ? 'badge-leader' : 'badge-member')"
                  th:text="${user.primaryRole.replace('ROLE_','')}"></span>
            <span class="badge"
                  th:classappend="${user.enabled} ? 'badge-active' : 'badge-cancelled'"
                  th:text="${user.enabled} ? 'Active' : 'Disabled'"></span>
          </div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:800px;">

        <!-- User Info -->
        <div class="card">
          <div class="card-header"><span class="card-title">User Information</span></div>
          <div class="card-body" style="display:grid;gap:14px;">
            <div>
              <div class="text-muted fs-12 mb-4">Full Name</div>
              <div class="fw-600" th:text="${user.fullName}"></div>
            </div>
            <div>
              <div class="text-muted fs-12 mb-4">Username</div>
              <div class="fw-600" th:text="'@' + ${user.username}"></div>
            </div>
            <div>
              <div class="text-muted fs-12 mb-4">Email</div>
              <div class="fw-600" th:text="${user.email}"></div>
            </div>
            <div>
              <div class="text-muted fs-12 mb-4">Phone</div>
              <div class="fw-600" th:text="${user.phone ?: 'Not set'}"></div>
            </div>
            <div>
              <div class="text-muted fs-12 mb-4">Joined</div>
              <div class="fw-600" th:text="${#temporals.format(user.createdAt,'dd MMMM yyyy')}"></div>
            </div>
            <div th:if="${user.bio}">
              <div class="text-muted fs-12 mb-4">Bio</div>
              <div class="fw-600" th:text="${user.bio}"></div>
            </div>
          </div>
        </div>

        <!-- Admin Actions -->
        <div>
          <!-- Change Role -->
          <div class="card mb-24">
            <div class="card-header"><span class="card-title">Change Role</span></div>
            <div class="card-body">
              <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post"
                    class="d-flex gap-8 align-center">
                <select name="role" class="form-select">
                  <option value="ROLE_ADMIN"  th:selected="${user.primaryRole == 'ROLE_ADMIN'}">Admin</option>
                  <option value="ROLE_LEADER" th:selected="${user.primaryRole == 'ROLE_LEADER'}">Leader</option>
                  <option value="ROLE_MEMBER" th:selected="${user.primaryRole == 'ROLE_MEMBER'}">Member</option>
                </select>
                <button type="submit" class="btn btn-primary">Update</button>
              </form>
            </div>
          </div>

          <!-- Enable/Disable -->
          <div class="card mb-24">
            <div class="card-header"><span class="card-title">Account Status</span></div>
            <div class="card-body">
              <form th:action="@{/admin/users/{id}/toggle-status(id=${user.id})}" method="post">
                <button type="submit"
                        th:classappend="${user.enabled} ? 'btn btn-warning' : 'btn btn-success'"
                        th:text="${user.enabled} ? 'Disable Account' : 'Enable Account'"
                        data-confirm="Are you sure you want to change this user's status?">
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
