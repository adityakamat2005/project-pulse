<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Tasks — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('Tasks')}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/topbar :: alerts}"></div>

      <!-- Header -->
      <div class="page-header">
        <div>
          <div class="d-flex align-center gap-8 mb-4">
            <a th:href="@{/projects/{id}(id=${project.id})}" class="text-muted fs-13">
              <i class="bi bi-arrow-left"></i> <span th:text="${project.title}"></span>
            </a>
          </div>
          <h1 class="page-title">Tasks</h1>
          <p class="page-subtitle" th:text="${tasks.size()} + ' task(s)'"></p>
        </div>
        <div class="page-actions">
          <a th:href="@{/calendar(projectId=${project.id})}" class="btn btn-outline">
            <i class="bi bi-calendar3"></i> Calendar
          </a>
          <a sec:authorize="hasAnyRole('ADMIN','LEADER')"
             th:href="@{/tasks/new(projectId=${project.id})}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> New Task
          </a>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-bar">
        <span class="fw-600 fs-13 text-muted">Filter:</span>
        <a th:href="@{/tasks(projectId=${project.id})}"
           class="btn btn-sm" th:classappend="(${selectedStatus == null} and ${selectedPriority == null}) ? 'btn-primary' : 'btn-outline'">All</a>
        <a th:each="s : ${taskStatuses}"
           th:href="@{/tasks(projectId=${project.id},status=${s.name()})}"
           class="btn btn-sm"
           th:classappend="${selectedStatus == s.name()} ? 'btn-primary' : 'btn-outline'"
           th:text="${s}"></a>
        <span class="text-muted">|</span>
        <a th:each="p : ${priorities}"
           th:href="@{/tasks(projectId=${project.id},priority=${p.name()})}"
           class="btn btn-sm"
           th:classappend="${selectedPriority == p.name()} ? 'btn-primary' : 'btn-outline'"
           th:text="${p}"></a>
        <a th:href="@{/tasks(projectId=${project.id},pinned=true)}" class="btn btn-sm btn-outline">
          <i class="bi bi-pin-fill" style="color:var(--warning);"></i> Pinned
        </a>
      </div>

      <!-- Task List -->
      <div th:if="${tasks.isEmpty()}" class="empty-state">
        <i class="bi bi-list-task"></i>
        <h3>No tasks found</h3>
        <p>No tasks match the current filter, or no tasks have been created yet.</p>
        <a sec:authorize="hasAnyRole('ADMIN','LEADER')"
           th:href="@{/tasks/new(projectId=${project.id})}" class="btn btn-primary">
          <i class="bi bi-plus-lg"></i> Create Task
        </a>
      </div>

      <div th:each="task : ${tasks}" class="task-item"
           th:classappend="${task.pinned} ? 'pinned' : '' + ' ' + (${task.overdue} ? 'overdue' : '')">
        <!-- Pin indicator -->
        <div style="padding-top:2px;">
          <i class="bi bi-pin-fill task-pin-icon" th:if="${task.pinned}"></i>
          <i class="bi bi-circle-fill fs-12"
             th:unless="${task.pinned}"
             th:style="'color:' + (${task.priority.name() == 'HIGH'} ? 'var(--danger)' : (${task.priority.name() == 'MEDIUM'} ? 'var(--warning)' : 'var(--success)'))"></i>
        </div>

        <!-- Task Info -->
        <div style="flex:1;">
          <div class="task-title">
            <a th:href="@{/tasks/{id}(id=${task.id})}" th:text="${task.title}"></a>
          </div>
          <div class="task-meta">
            <span><i class="bi bi-person"></i> <span th:text="${task.assignedTo?.fullName ?: 'Unassigned'}"></span></span>
            <span><i class="bi bi-calendar"></i> <span th:text="${#temporals.format(task.deadline,'dd MMM yyyy')}"></span></span>
            <span th:if="${task.overdue}" style="color:var(--danger);font-weight:600;">
              <i class="bi bi-exclamation-circle"></i> Overdue
            </span>
            <span th:if="${task.pinned}" style="color:var(--warning);">
              <i class="bi bi-pin-fill"></i> Pinned
            </span>
          </div>
        </div>

        <!-- Badges -->
        <div class="d-flex align-center gap-8">
          <span class="badge" th:classappend="'badge-' + ${task.priority.name().toLowerCase()}"
                th:text="${task.priority}"></span>
          <span class="badge" th:classappend="'badge-' + ${task.status.name().toLowerCase().replace('_','-')}"
                th:text="${task.status}"></span>
        </div>

        <!-- Actions -->
        <div class="d-flex align-center gap-8">
          <a th:href="@{/tasks/{id}(id=${task.id})}" class="btn btn-outline btn-sm">
            <i class="bi bi-eye"></i>
          </a>
          <!-- Pin toggle (leader/admin) -->
          <form sec:authorize="hasAnyRole('ADMIN','LEADER')"
                th:action="@{/tasks/{id}/pin(id=${task.id})}" method="post" style="display:inline;">
            <input type="hidden" name="projectId" th:value="${project.id}"/>
            <button type="submit" class="btn btn-outline btn-sm" th:title="${task.pinned} ? 'Unpin' : 'Pin'">
              <i th:class="${task.pinned} ? 'bi bi-pin-angle-fill' : 'bi bi-pin'"></i>
            </button>
          </form>
          <!-- Delete (leader/admin) -->
          <form sec:authorize="hasAnyRole('ADMIN','LEADER')"
                th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-outline btn-sm" style="color:var(--danger);"
                    data-confirm="Delete this task permanently?">
              <i class="bi bi-trash"></i>
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
