<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Error — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
            background:linear-gradient(135deg,#1e1b4b,#312e81,#4338ca);padding:20px;">
  <div style="text-align:center;color:#fff;max-width:460px;">

    <div style="font-size:80px;font-weight:800;color:rgba(255,255,255,.15);line-height:1;margin-bottom:8px;"
         th:text="${errorCode ?: 500}"></div>

    <i class="bi bi-exclamation-triangle-fill"
       style="font-size:52px;color:#f59e0b;margin-bottom:20px;display:block;"></i>

    <h1 style="font-size:22px;font-weight:800;margin-bottom:10px;"
        th:text="${errorCode == 404} ? 'Page Not Found' : (${errorCode == 403} ? 'Access Denied' : 'Something Went Wrong')">
    </h1>

    <p style="color:rgba(255,255,255,.7);font-size:14px;margin-bottom:28px;line-height:1.7;"
       th:text="${errorMessage ?: 'An unexpected error occurred. Please try again.'}"></p>

    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a th:href="@{/dashboard}" style="background:#4f46e5;color:#fff;padding:10px 24px;border-radius:8px;font-weight:700;text-decoration:none;">
        <i class="bi bi-house-fill"></i> Go to Dashboard
      </a>
      <a href="javascript:history.back()" style="background:rgba(255,255,255,.15);color:#fff;padding:10px 24px;border-radius:8px;font-weight:700;text-decoration:none;">
        <i class="bi bi-arrow-left"></i> Go Back
      </a>
    </div>
  </div>
</div>
</body>
</html>
