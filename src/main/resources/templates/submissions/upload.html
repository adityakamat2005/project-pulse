<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Submit File — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('Submit File')}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/topbar :: alerts}"></div>

      <div class="page-header">
        <div>
          <a th:href="@{/tasks/{id}(id=${task.id})}" class="text-muted fs-13">
            <i class="bi bi-arrow-left"></i> Back to Task
          </a>
          <h1 class="page-title mt-8">Submit File for Review</h1>
          <p class="page-subtitle">Task: <strong th:text="${task.title}"></strong></p>
        </div>
      </div>

      <div style="max-width:560px;">
        <div class="card">
          <div class="card-body">
            <!-- Task Context -->
            <div style="background:var(--bg);border-radius:8px;padding:14px 16px;margin-bottom:22px;">
              <div class="fw-600 fs-13" th:text="${task.title}"></div>
              <div class="task-meta mt-4">
                <span><i class="bi bi-folder2"></i> <span th:text="${task.project.title}"></span></span>
                <span><i class="bi bi-calendar"></i> Due <span th:text="${#temporals.format(task.deadline,'dd MMM yyyy')}"></span></span>
              </div>
            </div>

            <form th:action="@{/submissions/upload/{id}(id=${task.id})}"
                  method="post" enctype="multipart/form-data">

              <!-- File Drop Zone -->
              <div style="margin-bottom:18px;">
                <label class="form-label">File <span style="color:var(--danger);">*</span></label>
                <label id="fileLabel" for="fileInput"
                       style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                              border:2px dashed var(--border);border-radius:12px;padding:36px;
                              cursor:pointer;transition:var(--transition);text-align:center;gap:8px;">
                  <i class="bi bi-cloud-upload" style="font-size:32px;color:var(--primary);"></i>
                  <span class="fw-600">Click to upload or drag &amp; drop</span>
                  <span class="text-muted fs-12">Max file size: 10MB</span>
                </label>
                <input type="file" id="fileInput" name="file"
                       style="display:none;" required
                       accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.zip,.txt,.py,.java,.html,.css,.js"/>
              </div>

              <div style="margin-bottom:22px;">
                <label class="form-label">Notes (optional)</label>
                <textarea name="notes" class="form-control" rows="3"
                          data-maxlength="500"
                          placeholder="Add any notes for the reviewer..."></textarea>
              </div>

              <div class="d-flex gap-8">
                <button type="submit" class="btn btn-primary">
                  <i class="bi bi-upload"></i> Submit for Review
                </button>
                <a th:href="@{/tasks/{id}(id=${task.id})}" class="btn btn-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>

        <!-- Previous Submissions -->
        <div class="card mt-24" th:if="${!task.submissions.isEmpty()}">
          <div class="card-header"><span class="card-title">Previous Submissions</span></div>
          <div class="card-body">
            <div th:each="sub : ${task.submissions}" style="padding:8px 0;border-bottom:1px solid var(--border);">
              <div class="d-flex justify-between align-center">
                <div>
                  <div class="fw-600 fs-13" th:text="${sub.originalFileName}"></div>
                  <div class="text-muted fs-12" th:text="${#temporals.format(sub.submittedAt,'dd MMM yyyy HH:mm')}"></div>
                </div>
                <span class="badge"
                      th:classappend="${sub.status.name() == 'APPROVED'} ? 'badge-approved' : (${sub.status.name() == 'REJECTED'} ? 'badge-rejected' : 'badge-submitted')"
                      th:text="${sub.status}"></span>
              </div>
              <div class="text-muted fs-12 mt-4" th:if="${sub.reviewNotes}">
                Reviewer: <em th:text="${sub.reviewNotes}"></em>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
