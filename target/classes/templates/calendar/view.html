<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Calendar — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('Calendar')}"></div>
    <div class="page-body">

      <!-- Header + Navigation -->
      <div class="page-header">
        <div class="d-flex align-center gap-16">
          <a th:href="@{/calendar(year=${prevYear},month=${prevMonth},projectId=${selectedProject})}"
             class="btn btn-outline btn-icon"><i class="bi bi-chevron-left"></i></a>
          <h1 class="page-title" th:text="${yearMonth.month.getDisplayName(T(java.time.format.TextStyle).FULL, T(java.util.Locale).ENGLISH) + ' ' + yearMonth.year}"></h1>
          <a th:href="@{/calendar(year=${nextYear},month=${nextMonth},projectId=${selectedProject})}"
             class="btn btn-outline btn-icon"><i class="bi bi-chevron-right"></i></a>
          <a th:href="@{/calendar}" class="btn btn-outline btn-sm">Today</a>
        </div>
        <!-- Project Filter -->
        <div class="d-flex align-center gap-8">
          <select id="projectFilter" class="form-select" style="width:220px;"
                  onchange="window.location='/calendar?year='+new URLSearchParams(window.location.search).get('year')+'&month='+new URLSearchParams(window.location.search).get('month')+'&projectId='+this.value">
            <option value="">All Projects</option>
            <option th:each="p : ${projects}" th:value="${p.id}"
                    th:text="${p.title}"
                    th:selected="${selectedProject != null and selectedProject == p.id}"></option>
          </select>
        </div>
      </div>

      <!-- Legend -->
      <div class="d-flex align-center gap-16 mb-16 fs-12">
        <span><span style="background:#fef2f2;color:var(--danger);padding:2px 8px;border-radius:4px;">●</span> High Priority</span>
        <span><span style="background:#fffbeb;color:#92400e;padding:2px 8px;border-radius:4px;">●</span> Medium Priority</span>
        <span><span style="background:#ecfdf5;color:var(--success);padding:2px 8px;border-radius:4px;">●</span> Low Priority</span>
        <span><i class="bi bi-pin-fill" style="color:var(--warning);"></i> Pinned</span>
      </div>

      <!-- Calendar Grid -->
      <div class="calendar-grid">
        <!-- Day Headers -->
        <div class="calendar-day-header">Sun</div>
        <div class="calendar-day-header">Mon</div>
        <div class="calendar-day-header">Tue</div>
        <div class="calendar-day-header">Wed</div>
        <div class="calendar-day-header">Thu</div>
        <div class="calendar-day-header">Fri</div>
        <div class="calendar-day-header">Sat</div>

        <!-- Calendar Cells -->
        <div th:each="day : ${calendarDays}"
             th:classappend="${day == null} ? 'calendar-cell other-month' : (${day.equals(today)} ? 'calendar-cell today' : 'calendar-cell')">

          <!-- Day Number -->
          <div th:if="${day != null}" class="calendar-date">
            <span th:if="${day.equals(today)}" class="calendar-date today-num" th:text="${day.dayOfMonth}"></span>
            <span th:unless="${day.equals(today)}" th:text="${day.dayOfMonth}"></span>
          </div>

          <!-- Tasks for this day -->
          <div th:if="${day != null and tasksByDay.containsKey(day.dayOfMonth)}">
            <div th:each="task : ${tasksByDay[day.dayOfMonth]}"
                 class="calendar-task-dot"
                 th:classappend="${task.priority.name().toLowerCase()} + (${task.pinned} ? ' pinned' : '')"
                 th:title="${task.title + ' — ' + task.status}"
                 onclick="window.location='/tasks/' + [[${task.id}]]">
              <i class="bi bi-pin-fill" th:if="${task.pinned}" style="font-size:9px;"></i>
              <span th:text="${task.title}"></span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
