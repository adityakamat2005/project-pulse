<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="'Chat — ' + ${project.title}">Chat</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <div class="main-content">
    <header class="topbar">
      <div class="d-flex align-center gap-12">
        <a th:href="@{/projects/{id}(id=${project.id})}" class="btn btn-outline btn-icon">
          <i class="bi bi-arrow-left"></i>
        </a>
        <div>
          <div class="fw-700" th:text="${project.title}"></div>
          <div class="text-muted fs-12">Team Chat</div>
        </div>
      </div>
      <div class="d-flex align-center gap-8">
        <span class="text-muted fs-12" id="connectionStatus">Connecting...</span>
        <a th:href="@{/tasks(projectId=${project.id})}" class="btn btn-outline btn-sm">
          <i class="bi bi-list-task"></i> Tasks
        </a>
      </div>
    </header>

    <div class="chat-wrapper">
      <div class="chat-messages" id="chatMessages">

        <div th:each="msg : ${messages}"
             class="chat-message"
             th:classappend="${msg.senderUsername == currentUser.username} ? 'own' : ''">
          <div class="chat-avatar"
               th:text="${#strings.substring(msg.senderFullName, 0, 2).toUpperCase()}"></div>
          <div>
            <div class="chat-bubble">
              <div class="chat-sender"
                   th:text="${msg.senderUsername == currentUser.username ? 'You' : msg.senderFullName}"></div>
              <div class="chat-text" th:text="${msg.content}"></div>
              <div class="chat-time"
                   th:text="${#temporals.format(msg.sentAt,'HH:mm · dd MMM')}"></div>
            </div>
          </div>
        </div>

        <div th:if="${messages.isEmpty()}" class="empty-state" style="margin:auto;">
          <i class="bi bi-chat-dots"></i>
          <h3>No messages yet</h3>
          <p>Be the first to say something to the team!</p>
        </div>
      </div>

      <!-- Input area -->
      <div class="chat-input-area">
        <div class="chat-input-row">
          <input type="text" id="wsMessageInput" class="chat-input"
                 placeholder="Type a message... (Enter to send)"
                 autocomplete="off" maxlength="1000"/>
          <!-- Store dynamic values in data attributes — Thymeleaf 3.1 safe -->
          <button id="wsSendBtn" class="btn btn-primary"
                  th:data-project-id="${project.id}"
                  th:data-username="${currentUser.username}"
                  th:data-fullname="${currentUser.fullName}">
            <i class="bi bi-send-fill"></i>
          </button>
        </div>
        <!-- HTTP fallback -->
        <form id="httpChatForm"
              th:action="@{/chat/{id}/send(id=${project.id})}"
              method="post"
              style="display:none;">
          <input type="hidden" name="content" value=""/>
        </form>
        <div class="text-muted fs-12 mt-4" style="text-align:center;">
          Real-time messaging powered by WebSocket
        </div>
      </div>
    </div>
  </div>
</div>

<!-- SockJS + STOMP -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/chat.js}"></script>
<script>
  // Read values from data attributes — avoids Thymeleaf 3.1 th:onclick restriction
  const sendBtn   = document.getElementById('wsSendBtn');
  const projectId = sendBtn.getAttribute('data-project-id');
  const username  = sendBtn.getAttribute('data-username');
  const fullName  = sendBtn.getAttribute('data-fullname');

  // Connect WebSocket
  connectChat(projectId, username);

  // Wire up send button
  sendBtn.addEventListener('click', function () {
    sendWsMessage(projectId, username, fullName);
  });

  // Show connection status after 1.5s
  setTimeout(function () {
    const el = document.getElementById('connectionStatus');
    if (stompClient && stompClient.connected) {
      el.textContent = '🟢 Connected';
      el.style.color = 'var(--success)';
    } else {
      el.textContent = '🟡 HTTP mode';
      el.style.color = 'var(--warning)';
    }
  }, 1500);
</script>
</body>
</html>
