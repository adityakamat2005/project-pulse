<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${isNew} ? 'New Task' : 'Edit Task'">Task Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar(${isNew ? 'New Task' : 'Edit Task'})}"></div>
    <div class="page-body">

      <div class="page-header">
        <div>
          <a th:href="@{/tasks(projectId=${project.id})}" class="text-muted fs-13">
            <i class="bi bi-arrow-left"></i> Back to Tasks
          </a>
          <h1 class="page-title mt-8" th:text="${isNew} ? 'Create New Task' : 'Edit Task'"></h1>
          <p class="page-subtitle">Project: <strong th:text="${project.title}"></strong></p>
        </div>
      </div>

      <div style="max-width:680px;">
        <div class="card">
          <div class="card-body">
            <form th:action="${isNew ? '/tasks/new' : '/tasks/' + taskDto.id + '/edit'}"
                  th:object="${taskDto}" method="post">

              <input type="hidden" th:field="*{projectId}"/>

              <div style="margin-bottom:18px;">
                <label class="form-label">Task Title <span style="color:var(--danger);">*</span></label>
                <input type="text" th:field="*{title}" class="form-control"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                       placeholder="e.g. Implement moisture sensor calibration"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
              </div>

              <div style="margin-bottom:18px;">
                <label class="form-label">Description</label>
                <textarea th:field="*{description}" class="form-control" rows="4"
                          data-maxlength="2000"
                          placeholder="Describe what needs to be done, acceptance criteria, etc."></textarea>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;">
                <div>
                  <label class="form-label">Deadline <span style="color:var(--danger);">*</span></label>
                  <input type="date" th:field="*{deadline}" class="form-control"
                         th:classappend="${#fields.hasErrors('deadline')} ? 'is-invalid'"/>
                  <div class="invalid-feedback" th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"></div>
                </div>
                <div>
                  <label class="form-label">Priority <span style="color:var(--danger);">*</span></label>
                  <select th:field="*{priority}" class="form-select">
                    <option value="">— Select Priority —</option>
                    <option th:each="p : ${priorities}" th:value="${p.name()}" th:text="${p}"></option>
                  </select>
                </div>
              </div>

              <div style="margin-bottom:18px;">
                <label class="form-label">Assign To</label>
                <select th:field="*{assignedToId}" class="form-select">
                  <option value="">— Unassigned —</option>
                  <option th:each="m : ${members}" th:value="${m.id}"
                          th:text="${m.fullName + ' (' + m.username + ')'}"></option>
                </select>
              </div>

              <div style="margin-bottom:24px;">
                <div class="form-check">
                  <input type="checkbox" th:field="*{pinned}" class="form-check-input" id="pinnedCheck"/>
                  <label for="pinnedCheck" class="form-label" style="margin-bottom:0;">
                    <i class="bi bi-pin-fill" style="color:var(--warning);"></i>
                    Pin this task (highlight as important)
                  </label>
                </div>
              </div>

              <div class="d-flex gap-8">
                <button type="submit" class="btn btn-primary">
                  <i th:class="${isNew} ? 'bi bi-plus-lg' : 'bi bi-check-lg'"></i>
                  <span th:text="${isNew} ? 'Create Task' : 'Save Changes'"></span>
                </button>
                <a th:href="@{/tasks(projectId=${project.id})}" class="btn btn-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
