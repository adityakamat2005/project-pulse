<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Panel — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('Admin Panel')}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/topbar :: alerts}"></div>

      <div class="page-header">
        <div>
          <h1 class="page-title">Admin Panel</h1>
          <p class="page-subtitle">System overview and user management.</p>
        </div>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">
          <i class="bi bi-person-plus"></i> Create User
        </a>
      </div>

      <!-- Stats -->
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:28px;">
        <div class="stat-card">
          <div class="stat-icon purple"><i class="bi bi-people-fill"></i></div>
          <div><div class="stat-value" th:text="${totalUsers}">0</div><div class="stat-label">Total Users</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><i class="bi bi-folder2-open"></i></div>
          <div><div class="stat-value" th:text="${totalProjects}">0</div><div class="stat-label">Projects</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon cyan"><i class="bi bi-list-task"></i></div>
          <div><div class="stat-value" th:text="${totalTasks}">0</div><div class="stat-label">Tasks</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="bi bi-check2-all"></i></div>
          <div><div class="stat-value" th:text="${completedTasks}">0</div><div class="stat-label">Completed</div></div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">

        <!-- Recent Users -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">All Users</span>
            <a th:href="@{/admin/users}" class="btn btn-outline btn-sm">Manage</a>
          </div>
          <div class="card-body" style="padding:0;">
            <table class="pp-table">
              <thead><tr><th>User</th><th>Role</th><th>Status</th></tr></thead>
              <tbody>
              <tr th:each="u : ${allUsers}">
                <td>
                  <div class="fw-600" th:text="${u.fullName}"></div>
                  <div class="text-muted fs-12" th:text="${u.username}"></div>
                </td>
                <td>
                  <span class="badge"
                        th:classappend="${u.primaryRole == 'ROLE_ADMIN'} ? 'badge-admin' : (${u.primaryRole == 'ROLE_LEADER'} ? 'badge-leader' : 'badge-member')"
                        th:text="${u.primaryRole.replace('ROLE_','')}"></span>
                </td>
                <td>
                  <span class="badge" th:classappend="${u.enabled} ? 'badge-active' : 'badge-cancelled'"
                        th:text="${u.enabled} ? 'Active' : 'Disabled'"></span>
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Recent Projects -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">All Projects</span>
            <a th:href="@{/projects}" class="btn btn-outline btn-sm">View All</a>
          </div>
          <div class="card-body" style="padding:0;">
            <table class="pp-table">
              <thead><tr><th>Project</th><th>Leader</th><th>Status</th></tr></thead>
              <tbody>
              <tr th:each="p : ${allProjects}">
                <td>
                  <a th:href="@{/projects/{id}(id=${p.id})}" class="fw-600" th:text="${p.title}"></a>
                  <div class="text-muted fs-12" th:text="${p.tasks.size()} + ' tasks'"></div>
                </td>
                <td th:text="${p.leader?.fullName ?: '—'}"></td>
                <td>
                  <span class="badge"
                        th:classappend="'badge-' + ${p.status.name().toLowerCase().replace('_','-')}"
                        th:text="${p.status}"></span>
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
