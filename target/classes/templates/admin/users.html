<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Users — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('User Management')}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/topbar :: alerts}"></div>

      <div class="page-header">
        <div>
          <h1 class="page-title">User Management</h1>
          <p class="page-subtitle" th:text="${users.size()} + ' users registered'"></p>
        </div>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">
          <i class="bi bi-person-plus"></i> Create User
        </a>
      </div>

      <div class="card">
        <div class="card-body" style="padding:0;">
          <table class="pp-table">
            <thead>
              <tr>
                <th>User</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>
                <th>Joined</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
              <td>
                <div class="d-flex align-center gap-10">
                  <div class="chat-avatar" style="width:34px;height:34px;font-size:13px;flex-shrink:0;"
                       th:text="${#strings.substring(u.fullName,0,1)}"></div>
                  <div>
                    <div class="fw-600" th:text="${u.fullName}"></div>
                    <div class="text-muted fs-12" th:text="'@' + ${u.username}"></div>
                  </div>
                </div>
              </td>
              <td class="text-muted fs-13" th:text="${u.email}"></td>
              <td>
                <span class="badge"
                      th:classappend="${u.primaryRole == 'ROLE_ADMIN'} ? 'badge-admin' : (${u.primaryRole == 'ROLE_LEADER'} ? 'badge-leader' : 'badge-member')"
                      th:text="${u.primaryRole.replace('ROLE_','')}"></span>
              </td>
              <td>
                <span class="badge"
                      th:classappend="${u.enabled} ? 'badge-active' : 'badge-cancelled'"
                      th:text="${u.enabled} ? 'Active' : 'Disabled'"></span>
              </td>
              <td class="text-muted fs-13"
                  th:text="${#temporals.format(u.createdAt,'dd MMM yyyy')}"></td>
              <td>
                <div class="d-flex gap-8">
                  <a th:href="@{/admin/users/{id}(id=${u.id})}" class="btn btn-outline btn-sm">
                    <i class="bi bi-eye"></i>
                  </a>
                  <form th:action="@{/admin/users/{id}/toggle-status(id=${u.id})}" method="post"
                        style="display:inline;">
                    <button type="submit" class="btn btn-sm"
                            th:classappend="${u.enabled} ? 'btn-warning' : 'btn-success'"
                            th:text="${u.enabled} ? 'Disable' : 'Enable'"
                            th:data-confirm="${u.enabled} ? 'Disable this user?' : 'Enable this user?'">
                    </button>
                  </form>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
