<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${isNew} ? 'New Project' : 'Edit Project'" >Project Form</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar(${isNew ? 'New Project' : 'Edit Project'})}"></div>
    <div class="page-body">

      <div class="page-header">
        <div>
          <a th:href="@{/projects}" class="text-muted fs-13"><i class="bi bi-arrow-left"></i> Back to Projects</a>
          <h1 class="page-title mt-8" th:text="${isNew} ? 'Create New Project' : 'Edit Project'"></h1>
        </div>
      </div>

      <div style="max-width:700px;">
        <div class="card">
          <div class="card-body">
            <form th:action="${isNew ? '/projects/new' : '/projects/' + projectDto.id + '/edit'}"
                  th:object="${projectDto}" method="post">

              <div style="margin-bottom:18px;">
                <label class="form-label">Project Title <span style="color:var(--danger);">*</span></label>
                <input type="text" th:field="*{title}" class="form-control"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                       placeholder="e.g. IoT Monitoring System"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
              </div>

              <div style="margin-bottom:18px;">
                <label class="form-label">Description</label>
                <textarea th:field="*{description}" class="form-control" rows="4"
                          data-maxlength="2000"
                          placeholder="Describe the project goals, scope, and deliverables..."></textarea>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;">
                <div>
                  <label class="form-label">Deadline <span style="color:var(--danger);">*</span></label>
                  <input type="date" th:field="*{deadline}" class="form-control"
                         th:classappend="${#fields.hasErrors('deadline')} ? 'is-invalid'"/>
                  <div class="invalid-feedback" th:if="${#fields.hasErrors('deadline')}" th:errors="*{deadline}"></div>
                </div>
                <div th:unless="${isNew}">
                  <label class="form-label">Status</label>
                  <select th:field="*{status}" class="form-select">
                    <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s}"></option>
                  </select>
                </div>
              </div>

              <div style="margin-bottom:18px;">
                <label class="form-label">Project Leader <span style="color:var(--danger);">*</span></label>
                <select th:field="*{leaderId}" class="form-select"
                        th:classappend="${#fields.hasErrors('leaderId')} ? 'is-invalid'">
                  <option value="">— Select Leader —</option>
                  <option th:each="u : ${leaders}" th:value="${u.id}" th:text="${u.fullName + ' (' + u.username + ')'}"></option>
                </select>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('leaderId')}" th:errors="*{leaderId}"></div>
              </div>

              <div style="margin-bottom:24px;">
                <label class="form-label">Team Members <span class="text-muted fs-12">(hold Ctrl/Cmd to select multiple)</span></label>
                <select th:field="*{memberIds}" class="form-select" multiple size="6">
                  <option th:each="u : ${members}" th:value="${u.id}"
                          th:text="${u.fullName + ' (' + u.username + ')'}"></option>
                </select>
              </div>

              <div class="d-flex gap-8">
                <button type="submit" class="btn btn-primary">
                  <i th:class="${isNew} ? 'bi bi-plus-lg' : 'bi bi-check-lg'"></i>
                  <span th:text="${isNew} ? 'Create Project' : 'Save Changes'"></span>
                </button>
                <a th:href="@{/projects}" class="btn btn-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
