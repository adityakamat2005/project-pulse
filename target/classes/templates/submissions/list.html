<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pending Submissions — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('Submissions')}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/topbar :: alerts}"></div>

      <div class="page-header">
        <div>
          <h1 class="page-title">Pending Submissions</h1>
          <p class="page-subtitle">Review files submitted by team members.</p>
        </div>
      </div>

      <div th:if="${submissions.isEmpty()}" class="empty-state">
        <i class="bi bi-inbox"></i>
        <h3>No pending submissions</h3>
        <p>All submissions have been reviewed. Check back later.</p>
      </div>

      <div class="card" th:unless="${submissions.isEmpty()}">
        <div class="card-body" style="padding:0;">
          <table class="pp-table">
            <thead><tr>
              <th>File</th><th>Task</th><th>Project</th><th>Submitted By</th><th>Date</th><th>Action</th>
            </tr></thead>
            <tbody>
            <tr th:each="sub : ${submissions}">
              <td>
                <div class="fw-600 fs-13" th:text="${sub.originalFileName}"></div>
                <div class="text-muted fs-12" th:text="${sub.notes ?: 'No notes'}"></div>
              </td>
              <td><a th:href="@{/tasks/{id}(id=${sub.task.id})}" th:text="${sub.task.title}" class="fw-600"></a></td>
              <td th:text="${sub.task.project.title}"></td>
              <td th:text="${sub.submittedBy.fullName}"></td>
              <td th:text="${#temporals.format(sub.submittedAt,'dd MMM yyyy HH:mm')}"></td>
              <td>
                <div class="d-flex gap-8">
                  <a th:href="@{/submissions/review/{id}(id=${sub.id})}" class="btn btn-primary btn-sm">
                    <i class="bi bi-eye"></i> Review
                  </a>
                  <a th:href="@{/submissions/download/{id}(id=${sub.id})}" class="btn btn-outline btn-sm">
                    <i class="bi bi-download"></i>
                  </a>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
