<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Task Submissions — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('Task Submissions')}"></div>
    <div class="page-body">
      <div class="page-header">
        <div>
          <a th:href="@{/tasks/{id}(id=${task.id})}" class="text-muted fs-13">
            <i class="bi bi-arrow-left"></i> Back to Task
          </a>
          <h1 class="page-title mt-8">Submissions for: <span th:text="${task.title}"></span></h1>
        </div>
      </div>

      <div th:if="${submissions.isEmpty()}" class="empty-state">
        <i class="bi bi-inbox"></i><h3>No submissions yet</h3>
      </div>

      <div class="card" th:unless="${submissions.isEmpty()}">
        <div class="card-body" style="padding:0;">
          <table class="pp-table">
            <thead><tr><th>File</th><th>Submitted By</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
            <tr th:each="sub : ${submissions}">
              <td>
                <div class="fw-600" th:text="${sub.originalFileName}"></div>
                <div class="text-muted fs-12" th:text="${sub.notes}"></div>
              </td>
              <td th:text="${sub.submittedBy.fullName}"></td>
              <td th:text="${#temporals.format(sub.submittedAt,'dd MMM yyyy HH:mm')}"></td>
              <td><span class="badge"
                        th:classappend="${sub.status.name() == 'APPROVED'} ? 'badge-approved' : (${sub.status.name() == 'REJECTED'} ? 'badge-rejected' : 'badge-submitted')"
                        th:text="${sub.status}"></span></td>
              <td>
                <div class="d-flex gap-8">
                  <a th:href="@{/submissions/download/{id}(id=${sub.id})}" class="btn btn-outline btn-sm">
                    <i class="bi bi-download"></i> Download
                  </a>
                  <a th:if="${sub.status.name() == 'PENDING'}"
                     th:href="@{/submissions/review/{id}(id=${sub.id})}" class="btn btn-primary btn-sm">
                    Review
                  </a>
                </div>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
