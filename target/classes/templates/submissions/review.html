<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Review Submission — ProjectPulse</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="app-wrapper">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar('Review Submission')}"></div>
    <div class="page-body">
      <div th:replace="~{fragments/topbar :: alerts}"></div>

      <div class="page-header">
        <div>
          <a th:href="@{/submissions}" class="text-muted fs-13"><i class="bi bi-arrow-left"></i> Back to Submissions</a>
          <h1 class="page-title mt-8">Review Submission</h1>
        </div>
      </div>

      <div style="max-width:700px;">

        <!-- Submission Info -->
        <div class="card mb-24">
          <div class="card-header"><span class="card-title">Submission Details</span></div>
          <div class="card-body" style="display:grid;gap:14px;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
              <div>
                <div class="text-muted fs-12 mb-4">File</div>
                <div class="fw-600" th:text="${submission.originalFileName}"></div>
                <div class="text-muted fs-12" th:text="'Size: ' + ${submission.fileSize / 1024} + ' KB'"></div>
              </div>
              <div>
                <div class="text-muted fs-12 mb-4">Submitted By</div>
                <div class="fw-600" th:text="${submission.submittedBy.fullName}"></div>
                <div class="text-muted fs-12" th:text="${#temporals.format(submission.submittedAt,'dd MMM yyyy HH:mm')}"></div>
              </div>
              <div>
                <div class="text-muted fs-12 mb-4">Task</div>
                <div class="fw-600">
                  <a th:href="@{/tasks/{id}(id=${submission.task.id})}" th:text="${submission.task.title}"></a>
                </div>
              </div>
              <div>
                <div class="text-muted fs-12 mb-4">Project</div>
                <div class="fw-600" th:text="${submission.task.project.title}"></div>
              </div>
            </div>
            <div th:if="${submission.notes}">
              <div class="text-muted fs-12 mb-4">Member Notes</div>
              <div style="background:var(--bg);padding:10px 14px;border-radius:8px;font-size:13.5px;"
                   th:text="${submission.notes}"></div>
            </div>
            <!-- Download -->
            <a th:href="@{/submissions/download/{id}(id=${submission.id})}" class="btn btn-outline" style="width:fit-content;">
              <i class="bi bi-download"></i> Download File
            </a>
          </div>
        </div>

        <!-- Review Actions -->
        <div class="card" th:if="${submission.status.name() == 'PENDING'}">
          <div class="card-header"><span class="card-title">Your Decision</span></div>
          <div class="card-body">

            <div style="margin-bottom:18px;">
              <label class="form-label">Review Notes (optional)</label>
              <textarea id="reviewNotesInput" class="form-control" rows="3"
                        data-maxlength="500"
                        placeholder="Add feedback for the team member..."></textarea>
            </div>

            <div class="d-flex gap-12">
              <form th:action="@{/submissions/review/{id}/approve(id=${submission.id})}" method="post" style="flex:1;">
                <input type="hidden" name="reviewNotes" id="approveNotes"/>
                <button type="submit" class="btn btn-success btn-lg" style="width:100%;"
                        onclick="document.getElementById('approveNotes').value=document.getElementById('reviewNotesInput').value">
                  <i class="bi bi-check-circle-fill"></i> Approve Submission
                </button>
              </form>
              <form th:action="@{/submissions/review/{id}/reject(id=${submission.id})}" method="post" style="flex:1;">
                <input type="hidden" name="reviewNotes" id="rejectNotes"/>
                <button type="submit" class="btn btn-danger btn-lg" style="width:100%;"
                        data-confirm="Reject this submission? The member will need to resubmit."
                        onclick="document.getElementById('rejectNotes').value=document.getElementById('reviewNotesInput').value">
                  <i class="bi bi-x-circle-fill"></i> Reject Submission
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Already Reviewed -->
        <div class="card" th:unless="${submission.status.name() == 'PENDING'}">
          <div class="card-body" style="text-align:center;padding:32px;">
            <i class="bi bi-check2-circle" th:if="${submission.status.name() == 'APPROVED'}"
               style="font-size:48px;color:var(--success);display:block;margin-bottom:12px;"></i>
            <i class="bi bi-x-circle" th:if="${submission.status.name() == 'REJECTED'}"
               style="font-size:48px;color:var(--danger);display:block;margin-bottom:12px;"></i>
            <h3 class="fw-700 fs-15" th:text="'Submission ' + ${submission.status}"></h3>
            <p class="text-muted fs-13" th:if="${submission.reviewedAt}"
               th:text="'Reviewed on ' + ${#temporals.format(submission.reviewedAt,'dd MMM yyyy HH:mm')}"></p>
            <p class="text-muted fs-13" th:if="${submission.reviewNotes}" th:text="${submission.reviewNotes}"></p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
